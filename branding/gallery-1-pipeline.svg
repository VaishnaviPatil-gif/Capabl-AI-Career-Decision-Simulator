<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="800" fill="#f4efe7"/>
  <rect width="1200" height="170" fill="#1d1d1f"/>
  <rect x="0" y="166" width="1200" height="6" fill="#77410e"/>

  <!-- brand + title -->
  <g transform="translate(60,46)">
    <polyline points="9,11 17,11 17,20 25,20 25,29 34,29" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="square"/>
    <text x="56" y="29" fill="#ffffff" font-size="30" font-weight="700">Capabl</text>
  </g>
  <text x="60" y="128" fill="#ffffff" font-size="40" font-weight="800">How it works</text>
  <text x="640" y="128" fill="#e7d3b3" font-size="22" font-weight="600">Input → Reasoning → Output → Decision → Action</text>

  <!-- 5 stage cards -->
  <g transform="translate(0,250)">
    <!-- card template: x positions 60,288,516,744,972 (w 168, gap 60 with arrows) -->
    <g transform="translate(60,0)">
      <rect width="190" height="320" rx="24" fill="#ffffff"/>
      <circle cx="40" cy="52" r="20" fill="#1d1d1f"/><text x="40" y="59" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">1</text>
      <text x="24" y="110" fill="#1d1d1f" font-size="22" font-weight="800">Inputs</text>
      <text x="24" y="150" fill="#555" font-size="16">Resume, projects,</text>
      <text x="24" y="172" fill="#555" font-size="16">mock interview,</text>
      <text x="24" y="194" fill="#555" font-size="16">certs, GitHub,</text>
      <text x="24" y="216" fill="#555" font-size="16">target role</text>
      <rect x="24" y="262" rx="12" width="120" height="28" fill="#f0ece3"/><text x="38" y="281" fill="#77410e" font-size="14" font-weight="700">evidence</text>
    </g>
    <text x="268" y="170" fill="#b89968" font-size="34" font-weight="800">→</text>
    <g transform="translate(288,0)">
      <rect width="190" height="320" rx="24" fill="#ffffff"/>
      <circle cx="40" cy="52" r="20" fill="#1d1d1f"/><text x="40" y="59" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">2</text>
      <text x="24" y="110" fill="#1d1d1f" font-size="22" font-weight="800">Reasoning</text>
      <text x="24" y="150" fill="#555" font-size="16">LLM finds the 12</text>
      <text x="24" y="172" fill="#555" font-size="16">role skills; embeds</text>
      <text x="24" y="194" fill="#555" font-size="16">match evidence;</text>
      <text x="24" y="216" fill="#555" font-size="16">rules score it</text>
      <rect x="24" y="262" rx="12" width="150" height="28" fill="#f3ecff"/><text x="38" y="281" fill="#7c3aed" font-size="14" font-weight="700">LLM + rules</text>
    </g>
    <text x="496" y="170" fill="#b89968" font-size="34" font-weight="800">→</text>
    <g transform="translate(516,0)">
      <rect width="190" height="320" rx="24" fill="#ffffff"/>
      <circle cx="40" cy="52" r="20" fill="#1d1d1f"/><text x="40" y="59" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">3</text>
      <text x="24" y="110" fill="#1d1d1f" font-size="22" font-weight="800">Output</text>
      <text x="24" y="150" fill="#555" font-size="16">Readiness score,</text>
      <text x="24" y="172" fill="#555" font-size="16">skills mastered,</text>
      <text x="24" y="194" fill="#555" font-size="16">gaps — with a</text>
      <text x="24" y="216" fill="#555" font-size="16">confidence band</text>
      <rect x="24" y="262" rx="12" width="140" height="28" fill="#e8f8ef"/><text x="38" y="281" fill="#16794a" font-size="14" font-weight="700">explainable</text>
    </g>
    <text x="724" y="170" fill="#b89968" font-size="34" font-weight="800">→</text>
    <g transform="translate(744,0)">
      <rect width="190" height="320" rx="24" fill="#ffffff"/>
      <circle cx="40" cy="52" r="20" fill="#1d1d1f"/><text x="40" y="59" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">4</text>
      <text x="24" y="110" fill="#1d1d1f" font-size="22" font-weight="800">Decision</text>
      <text x="24" y="150" fill="#555" font-size="16">3 paths with real</text>
      <text x="24" y="172" fill="#555" font-size="16">tradeoffs. You</text>
      <text x="24" y="194" fill="#555" font-size="16">choose — the AI</text>
      <text x="24" y="216" fill="#555" font-size="16">never auto-picks</text>
      <rect x="24" y="262" rx="12" width="155" height="28" fill="#fff2e4"/><text x="38" y="281" fill="#b4123c" font-size="14" font-weight="700">human-in-loop</text>
    </g>
    <text x="952" y="170" fill="#b89968" font-size="34" font-weight="800">→</text>
    <g transform="translate(972,0)">
      <rect width="190" height="320" rx="24" fill="#ffffff"/>
      <circle cx="40" cy="52" r="20" fill="#16a34a"/><text x="40" y="59" fill="#fff" font-size="20" font-weight="800" text-anchor="middle">5</text>
      <text x="24" y="110" fill="#1d1d1f" font-size="22" font-weight="800">Action</text>
      <text x="24" y="150" fill="#555" font-size="16">Committed 7-day</text>
      <text x="24" y="172" fill="#555" font-size="16">plan with free</text>
      <text x="24" y="194" fill="#555" font-size="16">learning</text>
      <text x="24" y="216" fill="#555" font-size="16">resources</text>
      <rect x="24" y="262" rx="12" width="115" height="28" fill="#e6efff"/><text x="38" y="281" fill="#1d4ed8" font-size="14" font-weight="700">progress</text>
    </g>
  </g>

  <text x="60" y="660" fill="#1d1d1f" font-size="22" font-weight="700">Confusion → clarity → action.</text>
  <text x="60" y="694" fill="#6b6b6b" font-size="18">A coherent decision-support pipeline — not a chatbot, not a checklist.</text>
</svg>
